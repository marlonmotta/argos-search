<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Argos Launcher</title>
    <link rel="stylesheet" href="launcher.css" />
</head>
<body>
    <div id="launcher">
        <div class="launcher-bar">
            <span class="launcher-icon">👁️</span>
            <input id="launcher-input" type="text" placeholder="Argos Search..." autocomplete="off" spellcheck="false" autofocus />
            <span id="launcher-hint" class="launcher-hint">ESC to close</span>
        </div>
        <div id="launcher-results" class="launcher-results hidden"></div>
    </div>
    <script src="launcher.js"></script>
</body>
</html>
