<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Argos Launcher</title>
    <link rel="stylesheet" href="launcher.css">
</head>
<body>
    <div id="launcher-app" class="glass-panel">
        <div class="search-box">
            <span class="search-icon">🔎</span>
            <input id="launcher-input" type="text" placeholder="Search files... (Ctrl+Space to hide)" autocomplete="off" spellcheck="false" autofocus />
        </div>
        <div id="launcher-results" class="results-list hidden">
            <!-- Results injected here -->
        </div>
    </div>
    <script src="launcher.js"></script>
</body>
</html>
