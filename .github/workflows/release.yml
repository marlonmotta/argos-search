name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri App
        run: cargo tauri build
        working-directory: crates/tauri-app

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: argos-search-windows
          path: |
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri App
        run: cargo tauri build
        working-directory: crates/tauri-app

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: argos-search-macos
          path: |
            target/release/bundle/dmg/*.dmg
            target/release/bundle/macos/*.app

  release:
    name: Create Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: argos-search-windows
          path: artifacts/windows

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: argos-search-macos
          path: artifacts/macos

      - name: Generate Changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline --no-merges)
          else
            CHANGELOG=$(git log --oneline --no-merges $PREV_TAG..HEAD)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Argos Search ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows (MSI) | `argos-search-*.msi` |
            | Windows (EXE) | `argos-search-*.exe` |
            | macOS (DMG) | `argos-search-*.dmg` |

            ---
            Built with 🦀 Rust + ⚡ Tauri v2
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
